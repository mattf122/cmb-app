html<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Copper Mountain — Site Visit</title>
<style>
* { box-sizing: border-box; }
body { font-family: 'Georgia', serif; background: #2c2a27; color: #f5f0e8; margin: 0; padding: 0; min-height: 100vh; }
.app { min-height: 100vh; background: #2c2a27; }
.header { background: linear-gradient(135deg, #3d3a35 0%, #2c2a27 100%); border-bottom: 2px solid #b87333; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.logo { font-size: 13px; letter-spacing: 4px; text-transform: uppercase; color: #b87333; font-family: 'Georgia', serif; font-weight: bold; }
.step-badge { background: #b87333; color: white; border-radius: 20px; padding: 4px 14px; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; }
.progress { height: 3px; background: #5c5850; border-radius: 2px; margin-bottom: 0; }
.progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #b87333, #c9a84c); border-radius: 2px; transition: width 0.4s ease; }
.page { padding: 20px 16px; max-width: 600px; margin: 0 auto; }
.card { background: #3d3a35; border-radius: 12px; padding: 20px; margin-bottom: 16px; border: 1px solid #5c5850; }
.card-copper { background: linear-gradient(135deg, #8a552022, #3d3a35); border-radius: 12px; padding: 20px; margin-bottom: 16px; border: 1px solid #b8733344; }
.label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #d4956a; margin-bottom: 6px; display: block; }
.input, .textarea, .select { width: 100%; background: #2c2a27; border: 1px solid #5c5850; border-radius: 8px; padding: 12px 14px; color: #f5f0e8; font-size: 15px; font-family: 'Georgia', serif; box-sizing: border-box; outline: none; margin-bottom: 14px; }
.input:focus, .textarea:focus, .select:focus { border-color: #b87333 !important; box-shadow: 0 0 0 2px #b8733322; }
.btn-primary { background: linear-gradient(135deg, #b87333, #8a5520); color: white; border: none; border-radius: 10px; padding: 15px 28px; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; font-family: 'Georgia', serif; width: 100%; font-weight: bold; box-shadow: 0 4px 20px #b8733344; margin-bottom: 8px; }
.btn-secondary { background: transparent; color: #b87333; border: 1.5px solid #b87333; border-radius: 10px; padding: 12px 24px; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; font-family: 'Georgia', serif; width: 100%; }
.section-title { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: #b87333; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid #b8733333; }
.zone-card { background: #2c2a27; border-radius: 10px; padding: 16px; margin-bottom: 12px; border: 1px solid #b8733333; }
.error { color: #b84444; font-size: 13px; margin-bottom: 12px; }
.success { color: #4a7c59; font-size: 13px; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="app">
<div class="header">
<div class="logo">⬡ COPPER MOUNTAIN</div>
<div class="step-badge" id="step-badge">CLIENT</div>
<button onclick="openSettings()" style="background: none; border: none; color: #b87333; font-size: 20px; cursor: pointer;">⚙</button>
</div>
<div class="progress">
<div class="progress-fill" id="progress-fill" style="width: 0%;"></div>
</div>
<div id="app-content"></div>
<div style="height: 40px;"></div>
</div>
</div>

<script>
let apiKey = localStorage.getItem("cmb_api_key") || "";
let appData = { zones: [], concepts: {} };
let currentStep = 0;
const STEPS = ["Client", "Scope", "Estimate", "Concepts", "Review & Sign"];

function openSettings() {
  const key = prompt("Enter your Anthropic API key (sk-ant-...):", apiKey);
  if(key !== null) {
    apiKey = key.trim();
    localStorage.setItem("cmb_api_key", apiKey);
    alert("✓ API key saved!");
  }
}

function setStep(s) {
  currentStep = s;
  updateUI();
}

function updateUI() {
  const pct = (currentStep / (STEPS.length - 1)) * 100;
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("step-badge").textContent = STEPS[currentStep];
  renderStep();
}

function renderStep() {
  const content = document.getElementById("app-content");
  if(currentStep === 0) renderClient(content);
  else if(currentStep === 1) renderScope(content);
  else if(currentStep === 2) renderEstimate(content);
  else if(currentStep === 3) renderConcepts(content);
  else if(currentStep === 4) renderReview(content);
}

function renderClient(el) {
  el.innerHTML = `
    <div class="page">
      <div class="card-copper">
        <div class="section-title">Client Information</div>
        <label class="label">Client Name</label>
        <input type="text" placeholder="Full legal name" value="${appData.clientName||''}" onchange="appData.clientName=this.value"/>
        <label class="label">Project Address</label>
        <input type="text" placeholder="Street address" value="${appData.projectAddress||''}" onchange="appData.projectAddress=this.value"/>
        <label class="label">City</label>
        <input type="text" placeholder="City" value="${appData.projectCity||''}" onchange="appData.projectCity=this.value"/>
        <label class="label">Zip</label>
        <input type="text" placeholder="Zip" value="${appData.projectZip||''}" onchange="appData.projectZip=this.value"/>
        <label class="label">Email</label>
        <input type="email" placeholder="email@example.com" value="${appData.clientEmail||''}" onchange="appData.clientEmail=this.value"/>
        <label class="label">Phone</label>
        <input type="tel" placeholder="(406) 555-0000" value="${appData.clientPhone||''}" onchange="appData.clientPhone=this.value"/>
        <label class="label">Company</label>
        <select onchange="appData.company=this.value">
          <option>Copper Mountain Builders</option>
          <option>CMB Electric</option>
          <option>Ogle Heating and Cooling</option>
        </select>
        <label class="label">Your Name (Rep)</label>
        <input type="text" placeholder="Your name" value="${appData.repName||''}" onchange="appData.repName=this.value"/>
      </div>
      <button class="btn-primary" onclick="setStep(1)">Next: Scope →</button>
    </div>
  `;
}

function renderScope(el) {
  let zonesHtml = '';
  appData.zones.forEach((z, i) => {
    zonesHtml += `
      <div class="zone-card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
          <div><strong>${z.type}</strong> — ${z.finish}</div>
          <button onclick="appData.zones.splice(${i}, 1); updateUI();" style="background: #b84444; color: white; border: none; border-radius: 6px; padding: 4px 8px; cursor: pointer; font-size: 12px;">Delete</button>
        </div>
        <label class="label">Sq Ft</label>
        <input type="number" value="${z.sqft||''}" onchange="appData.zones[${i}].sqft=Number(this.value)"/>
        <label class="label">Notes</label>
        <textarea onchange="appData.zones[${i}].notes=this.value" style="min-height: 60px;">${z.notes||''}</textarea>
      </div>
    `;
  });

  el.innerHTML = `
    <div class="page">
      <div class="card-copper">
        <div class="section-title">Project Scope</div>
        ${zonesHtml}
        <label class="label">Add New Zone</label>
        <select id="new-zone-type" style="margin-bottom: 8px;">
          <option>Bathroom Remodel</option>
          <option>Kitchen Remodel</option>
          <option>Laundry Room</option>
          <option>Living Room</option>
          <option>Deck</option>
          <option>Porch Cover</option>
          <option>Addition</option>
          <option>Other</option>
        </select>
        <button class="btn-primary" onclick="addZone()">+ Add Zone</button>
        <label class="label" style="margin-top: 16px;">Project Notes</label>
        <textarea onchange="appData.projectNotes=this.value" style="min-height: 80px;">${appData.projectNotes||''}</textarea>
      </div>
      <button class="btn-primary" onclick="setStep(2)">Next: Generate Estimate →</button>
      <button class="btn-secondary" onclick="setStep(0)">← Back</button>
    </div>
  `;
}

function addZone() {
  const type = document.getElementById("new-zone-type").value;
  appData.zones.push({ type, sqft: 0, finish: "Mid-Grade", notes: "" });
  updateUI();
}

function renderEstimate(el) {
  if(!appData.estimate) {
    el.innerHTML = `
      <div class="page">
        <div class="card-copper">
          <div class="section-title">AI Estimate Generation</div>
          <p style="color: #e8e0d0; font-size: 14px; line-height: 1.7; margin-bottom: 20px;">Claude will analyze your ${appData.zones.length} zone(s) and generate a realistic low/high budget range for the Flathead Valley market.</p>
          ${!apiKey || apiKey.length < 10 ? '<div class="error">⚠ No API key set. Tap ⚙ to add your key.</div>' : ''}
          <button class="btn-primary" onclick="generateEstimate()" ${!apiKey || apiKey.length < 10 ? 'disabled' : ''}>✦ Generate AI Estimate</button>
        </div>
        <button class="btn-secondary" onclick="setStep(1)">← Back</button>
      </div>
    `;
  } else {
    const est = appData.estimate;
    el.innerHTML = `
      <div class="page">
        <div class="card" style="border: 1px solid #c9a84c44;">
          <div class="section-title" style="color: #c9a84c;">Estimate Summary</div>
          <p style="font-size: 14px; line-height: 1.8; color: #f5f0e8; margin-bottom: 16px;">${est.summary}</p>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
            <div style="text-align: center;">
              <div class="label" style="text-align: center;">Total Low</div>
              <div style="font-size: 22px; font-weight: bold; color: #c9a84c;">$${Number(est.totalLow).toLocaleString()}</div>
            </div>
            <div style="text-align: center;">
              <div class="label" style="text-align: center;">Total High</div>
              <div style="font-size: 22px; font-weight: bold; color: #c9a84c;">$${Number(est.totalHigh).toLocaleString()}</div>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="section-title">Zone Breakdown (Editable)</div>
          ${est.zones.map((z, i) => `
            <div style="margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid #5c5850;">
              <strong>${z.name}</strong>
              <label class="label" style="margin-top: 8px;">Low</label>
              <input type="number" value="${z.low}" onchange="appData.estimate.zones[${i}].low=Number(this.value); recalcTotal();"/>
              <label class="label">High</label>
              <input type="number" value="${z.high}" onchange="appData.estimate.zones[${i}].high=Number(this.value); recalcTotal();"/>
            </div>
          `).join('')}
        </div>
        <label class="label">Design Retainer ($)</label>
        <input type="number" value="${appData.retainerAmount||0}" onchange="appData.retainerAmount=Number(this.value)"/>
        <button class="btn-primary" onclick="setStep(3)">Next: Concept Designs →</button>
        <button class="btn-secondary" onclick="setStep(2)">← Regenerate</button>
        <button class="btn-secondary" onclick="setStep(1)">← Back</button>
      </div>
    `;
  }
}

function recalcTotal() {
  const zones = appData.estimate.zones;
  appData.estimate.totalLow = zones.reduce((s, z) => s + z.low, 0);
  appData.estimate.totalHigh = zones.reduce((s, z) => s + z.high, 0);
}

function renderConcepts(el) {
  el.innerHTML = `
    <div class="page">
      <div class="card-copper">
        <div class="section-title">Concept Designs</div>
        <p style="font-size: 14
